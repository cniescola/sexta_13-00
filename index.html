<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="container-fluid p-4 card bg-info">
    <nav class="container">
      <ul class="nav d-flex justify-content-center">
        <li class="nav-item"><a href="https://getbootstrap.com/docs/5.3/utilities/background/#background-color"
            class="nav-link text-light">Home</a></li>
        <li class="nav-item"><a href="#" class="nav-link text-light">About</a></li>
        <li class="nav-item"><a href="#" class="nav-link text-light">Services</a></li>
        <li class="nav-item"><a href="#" class="nav-link text-light">Contacts</a></li>
      </ul>
    </nav>
  </header>


  <main>
    <section class="container-fluid">
      <div class="container p-4">
        <div class="row">
          <div class="col col-8 card p-3">
            <h3>Cadastro de Produtos</h3>

            <div class="row mb-3">

              <div class="col">
                <label class="from-label">Nome Do Produto</label>
                <input type="text" class="form-control">
              </div>

              <div class="col">
                <label class="from-label">Codigo Do Produto</label>
                <input type="text" class="form-control">
              </div>

            </div>

            <div class="row">
              <div class="col">
                <label class="from-label">Descriçao Do Produto</label>
                <textarea class="form-control" rows="7"></textarea>
              </div>

              <div class="col">

                <div class="row">
                  <label class="from-label">Preço Da Entrega</label>
                  <input type="text" class="form-control">
                </div>

                <div class="row">
                  <label class="from-label">Preço Do Produto</label>
                  <input type="text" class="form-control">
                </div>

                <div class="row">
                  <label class="from-label">Porcentagem de Desconto</label>
                  <input type="text" class="form-control">
                </div>


              </div>
            </div>
          </div>

          <div class="col col-4 p-5 d-flex justify-content-around flex-colum card">
            <div class="">
              <button class="btn btn-success w-100">Salvar</button>
            </div>
            <div class="">
              <button class="btn btn-danger w-100">Excluir</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
