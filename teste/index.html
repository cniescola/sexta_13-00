<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="container-fluid p-4 card bg-info">
    <nav class="container">
      <ul class="nav d-flex justify-content-center">
        <li class="nav-item"><a href="https://getbootstrap.com/docs/5.3/utilities/background/#background-color"
            class="nav-link text-light">Home</a></li>
        <li class="nav-item"><a href="#" class="nav-link text-light">About</a></li>
        <li class="nav-item"><a href="#" class="nav-link text-light">Services</a></li>
        <li class="nav-item"><a href="#" class="nav-link text-light">Contacts</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="container-fluid bg-primary">
      <div class="container p-4">
        <div class="row">
          <div class="col col-4 card p-3">
            <h3> Cadastro de Login</h3>
            <div class="row mb-4">
            </div>
            <div class="col">
              <label class="from-label mt-3">Email</label>
              <input type="text" class="form-control mt-1" id="email">
            </div>

            <div class="row">
              <label class="from-label mt-3">Senha</label>
              <input type="text" class="form-control mt-1" id="senha">
            </div>

            <div class="">
              <button class="btn btn-success w-90 mt-3" id="salvarbtn">Salvar</button>
            </div>
            <div class="">
              <button class="btn btn-danger w-90 mt-2" id="excluirbtn">Excluir</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer></footer>

  <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
    crossorigin="anonymous"></script>

    <script type="text/javascript">
        $('#salvarbtn').click(function () {
          var email = $('#email').val();
          var senha = $('#senha').val();

          alert('Email: ' + email + '\n' + 
                'Senha: ' + senha + '');

  });

    </script>
    </body>
    </html>
